  - id: "moonshotai/kimi-k2.5"
    tier: "reasoning+"
    task_type: "reasoning+"
    tool_calls: "2-8"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.45"
      output_per_1m_tokens: "$2.20"
    description: >
      Kimi K2.5 by MoonshotAI. State-of-the-art in visual coding and autonomous
      agent paradigm. Built on Kimi K2 with ~15T mixed visual and text tokens.
      Strong in general reasoning, visual coding, and multi-step agentic tool-calling.
      262K context. $0.45/$2.20 per 1M tokens.
    best_for:
      - "Multi-step 2-8 tools with Many2one: 'create a sale for BOLTHERM with products from last quote'"
      - "Cross-model aggregation: 'total invoiced this month by client and product'"
      - "Ambiguity resolution: 'assign to the BOLTHERM account manager' (needs ID lookup)"
      - "Financial analysis: 'average margin per product in Q1', 'overdue receivables over 30 days'"
      - "Questions mentioning images, charts, or visual Agiweb data"
      - "Visual coding or coding tightly coupled to screenshots, charts, or UI mockups"
      - "Code changes that require reasoning+ depth: 2-8 tools, Many2one, or multi-entity context"
      - "Light conditional reasoning: 'if X then Y, else Z' with 1-2 conditional levels"
    not_for: >
      Straightforward text-only repo work with 1-5 tools and no ERP/visual complexity — prefer qwen/qwen3.5-35b-a3b or qwen/qwen3.5-plus-02-15 depending on context length.
      Long-context or heavy long multimodal in reasoning tier without 2-8 ERP orchestration — prefer qwen/qwen3.5-plus-02-15.
      Lightweight image/chart understanding within 262K with 1-5 tools — prefer qwen/qwen3.5-35b-a3b. Workflows with 8+ tool calls and complex conditional logic,
      iterative self-correction, multi-agent orchestration,
      or re-planning mid-execution.

