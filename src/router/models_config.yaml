      - "Interactive coding and structured outputs with 1-5 tool calls"
      - "Large-context requests up to ~1M tokens"
    not_for: >
      Heavy multi-entity orchestration requiring 2-8 tool calls or deeper
      branching logic; escalate to reasoning+ when required.

