  #   task_type: "vl-free"
  #   tool_calls: "0-4"
  #   context_window: 128000
  #   pricing:
  #     input_per_1m_tokens:  "$0"
  #     output_per_1m_tokens: "$0"
  #   description: >
  #     Gemma 4 E2B (~2.3B effective parameters). Multimodal: text, image, audio.
  #     Fastest and lightest in the Gemma 4 line. Built for high-throughput turns
  #     under tight latency/memory with modern agent and coding skills for its class.
  #     Use when a reasoning-tier model is unnecessary and local execution is available.
  #   best_for:
  #     - "Simple multimodal queries (text + image/audio) with 0-4 tool calls"
  #     - "High-throughput turns where full dense 8B+ footprint is unnecessary"
  #     - "Zero-cost local execution on edge hardware or laptops"
  #   not_for: >
  #     Deep reasoning, complex Many2one resolution, or tasks that require
  #     synthesis across multiple domains; step up to E4B or higher.

  # - id: "ollama/gemma4:e4b"
  #   tier: "vl-free"
  #   task_type: "vl-free"
  #   tool_calls: "0-4"
  #   context_window: 128000
  #   pricing:
  #     input_per_1m_tokens:  "$0"
  #     output_per_1m_tokens: "$0"
  #   description: >
  #     Gemma 4 E4B (~4.5B effective parameters). Same 128K context and multimodal
  #     stack (text, image, audio) as E2B but with stronger reasoning and coding
  #     headroom. Preferred vl-free default when E2B headroom is insufficient.
  #   best_for:
  #     - "Vl-free tasks needing more synthesis depth than E2B, still within 0-4 tools"
  #     - "Edge-class hardware with audio and vision in the loop"
  #   not_for: >
  #     Workloads needing 256K context or MoE-scale capacity; prefer gemma4:26b or above.

