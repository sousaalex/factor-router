  #     coding, and intricate tool orchestration before moving to paid tiers.
  #   best_for:
  #     - "Hardest local workloads: long coherent context, demanding synthesis, strong tool chains"
  #     - "When only the largest dense Gemma 4 variant is appropriate"
  #   not_for: >
  #     When a paid complex-tier model better matches cost, policy, or benchmark
  #     needs for the same task shape.

  # ===========================================================================
  # TIER: reasoning  │ tool_calls: 1–5  │ Cost: $1.50–$2.34 output/M
  # Direct Agiweb queries, focused CRUD, linear reasoning, code tasks
  # ===========================================================================

  - id: "x-ai/grok-code-fast-1"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 256000
    pricing:
      input_per_1m_tokens:  "$0.20"
      output_per_1m_tokens: "$1.50"
    description: >
      Grok Code Fast 1 by xAI. Cheapest reasoning-tier model; specialized in
      agentic coding workflows. Best fit for code generation, editing, debugging,
      and structured technical reasoning with moderate tool depth.
      256K context. $0.20/$1.50 per 1M tokens.
    best_for:
      - "Agentic coding tasks under budget: implement, refactor, fix, explain code paths"
      - "Technical workflows where 397B-level breadth is unnecessary"
      - "Fast iteration loops in engineering support contexts"
    not_for: >
      Broad business synthesis across multiple ERP domains, heavy multi-entity
      ambiguity, or deep conditional orchestration; escalate to reasoning+ or complex.

  - id: "qwen/qwen3.5-122b-a10b"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.26"
      output_per_1m_tokens: "$2.08"
    description: >
      Qwen3.5 122B-A10B by Qwen. Hybrid linear attention + sparse MoE architecture.
      Cost-efficient EXPERTISE model for real Agiweb work (not chat-only). Use for
      direct operational tasks where quality must exceed chat-tier behavior but
      the full 397B is overkill. 262K context. $0.26/$2.08 per 1M tokens.
    best_for:
      - "Reasoning-tier tasks with moderate tool depth and strong cost control"
      - "Operational Agiweb turns: structured extraction, normalization, short multi-step actions"
      - "When in doubt between this and 397B, prefer 122B if complexity and risk are low"
    not_for: >
      Complex workflows with Many2one ambiguity, deeper conditional logic,
      or broad cross-entity synthesis; escalate to 397B or Kimi when needed.

  - id: "qwen/qwen3.5-397b-a17b"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.39"
      output_per_1m_tokens: "$2.34"
    description: >
      Qwen3.5 397B-A17B by Qwen. State-of-the-art across language understanding,
      logical reasoning, code generation, agent tasks, and GUI interactions.
      Default fallback model — reliable reasoning with strong tool robustness.
      262K context. $0.39/$2.34 per 1M tokens.
    best_for:
      - "Direct Agiweb queries with 1-5 linear tool calls: 'total sales this week', 'list overdue invoices'"
      - "Single Agiweb model CRUD with known fields: 'update phone for contact', 'mark task as done'"
      - "State queries: 'what is the balance', 'how many orders', 'list clients of X'"
      - "Questions about the current Agiweb page or conversation context"
      - "Follow-ups needing maximum reliability vs. the 122B fallback"
    not_for: >
      Queries requiring comparison across multiple periods/entities,
      conditional workflows, deep Many2one resolution,
      or aggregation across 3+ different Agiweb models.

  # ===========================================================================
  # TIER: reasoning+  │ tool_calls: 2–8  │ Cost: $0.50–$2.20 output/M
  # Multi-entity, Many2one, conditional logic, long-context agentic flows
  # ===========================================================================

  - id: "x-ai/grok-4.1-fast"
    tier: "reasoning+"
    task_type: "reasoning+"
    tool_calls: "2-8"
    context_window: 2000000
    pricing:
      input_per_1m_tokens:  "$0.20"
      output_per_1m_tokens: "$0.50"
    description: >
      Grok 4.1 Fast by xAI. Strong agentic tool-calling model optimized for
      long-context, tool-heavy flows. 2M context window at the lowest output cost
      in this catalog. Use when reasoning+ quality is needed but budget is tight
      or context is very large (100K+). $0.20/$0.50 per 1M tokens.
    best_for:
      - "High-context (100K+) agentic tasks with 2-8 tool calls under strict budget"
      - "Customer support/investigation flows requiring durable long-context retention"
      - "Research-style synthesis before escalating to complex-tier models"
    not_for: >
      Safety-critical workflows with deep conditional orchestration and high
      cost-of-error (prefer complex tier), or trivial turns that reasoning tier can handle.

  - id: "moonshotai/kimi-k2.5"
    tier: "reasoning+"
    task_type: "reasoning+"
    tool_calls: "2-8"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.45"
      output_per_1m_tokens: "$2.20"
    description: >
      Kimi K2.5 by MoonshotAI. State-of-the-art in visual coding and autonomous
      agent paradigm. Built on Kimi K2 with ~15T mixed visual and text tokens.
      Strong in general reasoning, visual coding, and multi-step agentic tool-calling.
      262K context. $0.45/$2.20 per 1M tokens.
    best_for:
      - "Multi-step 2-8 tools with Many2one: 'create a sale for BOLTHERM with products from last quote'"
      - "Cross-model aggregation: 'total invoiced this month by client and product'"
      - "Ambiguity resolution: 'assign to the BOLTHERM account manager' (needs ID lookup)"
      - "Financial analysis: 'average margin per product in Q1', 'overdue receivables over 30 days'"
      - "Questions mentioning images, charts, or visual Agiweb data"
      - "Light conditional reasoning: 'if X then Y, else Z' with 1-2 conditional levels"
    not_for: >
      Workflows with 8+ tool calls and complex conditional logic,
      iterative self-correction, multi-agent orchestration,
      or re-planning mid-execution.

  # ===========================================================================
  # TIER: complex  │ tool_calls: 5–12  │ Cost: $4.50 output/M
  # Cascading creation, deep conditionals, multi-module reports, high-stakes
  # ===========================================================================

  # - id: "openai/gpt-5.4-mini"
  #   tier: "complex"
  #   task_type: "complex"
  #   tool_calls: "5-12"
  #   context_window: 400000
  #   pricing:
  #     input_per_1m_tokens:  "$0.75"
  #     output_per_1m_tokens: "$4.50"
  #   description: >
  #     GPT-5.4 Mini by OpenAI. Core GPT-5.4 capabilities in a faster model.
  #     Strong across reasoning, coding, and tool use. 400K context fits long
  #     histories and large page contexts. Reserve for genuinely complex or
  #     high-stakes requests — do not use as default.
  #     $0.75/$4.50 per 1M tokens.
  #   best_for:
  #     - "Workflows with 5-12 tools and multi-level conditionals: 'create quote with discount if total > 5000'"
  #     - "Cascading creation: 'create client, contact, linked project, and first task'"
  #     - "Deep Many2one with multiple resolution levels"
  #     - "Complex multi-module reports: 'full overview of everything that happened today'"
  #     - "Very long conversation histories requiring coherence across many turns"
  #     - "High-stakes operations where errors have real consequences (wrong PO, wrong approval)"
  #   not_for: >
  #     Tasks that Qwen 397B (reasoning) or Kimi (reasoning+) can handle correctly.
  #     Do not use as default — escalate only when complexity genuinely demands it.

  # ===========================================================================
  # TIER: frontier  │ tool_calls: 10+  │ Cost: $15.00 output/M  [DISABLED]
  # Explicit user request, massive context, iterative self-correction
  # ===========================================================================

  # - id: "anthropic/claude-sonnet-4.6"
  #   tier: "frontier"
  #   task_type: "frontier"
  #   tool_calls: "10+"
  #   context_window: 1000000
  #   pricing:
  #     input_per_1m_tokens:  "$3.00"
  #     output_per_1m_tokens: "$15.00"
  #   description: >
  #     Claude Sonnet 4.6 by Anthropic. Frontier performance in coding, agents,
  #     and professional work. 1M context. Excellent at iterative development,
  #     complex codebase navigation, end-to-end project management, polished
  #     document creation, and computer use. ABSOLUTE LAST RESORT — costs ~6.4x
  #     more than Qwen 397B on output tokens. $3.00/$15.00 per 1M tokens.
  #
  #   USE ONLY WHEN:
  #     - User explicitly requests Claude, frontier tier, or maximum capability
  #       NOTE: "reasoning+" in product language = Kimi K2.5, NOT Claude
  #     - 10+ tool calls with expected iterative self-correction and re-planning
  #     - End-to-end project management with many dependencies
  #     - Context >50K tokens where all other models lose coherence
  #     - Polished long document creation (reports, proposals, contracts)
  #     - Strategic business analysis requiring multi-dimensional reasoning
  #   best_for:
  #     - "Explicit frontier request: 'use Claude', 'frontier model', 'maximum capability'"
  #     - "Iterative self-correction in very long and complex agentic workflows"
  #     - "Polished document creation: 'prepare a full commercial proposal for client X'"
  #     - "Strategic business analysis that GPT-5.4 Mini cannot reliably complete"
  #   not_for: >
  #     ANY task that Qwen (reasoning), Kimi (reasoning+), or GPT-5.4 Mini (complex)
  #     can handle. Escalate ONLY on explicit user request or genuine frontier need.


# =============================================================================
# FALLBACK MODEL
# Used when the classifier cannot determine the tier with confidence.
# =============================================================================
default_model: "qwen/qwen3.5-397b-a17b"


