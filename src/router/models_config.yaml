  - id: "qwen/qwen3.5-plus-02-15"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 1000000
    pricing:
      input_per_1m_tokens:  "$0.26"
      output_per_1m_tokens: "$1.56"
    description: >
      Qwen3.5 Plus (release snapshot 2026-02-15). Native vision-language model in the Qwen3.5 Plus line, built on a hybrid
      architecture that combines linear attention with sparse mixture-of-experts for higher inference efficiency. The 3.5 series
      tracks near state-of-the-art on many evaluations, with a clear step up from Qwen3 in both pure-text and multimodal
      quality. 1,000,000 token context. $0.26/$1.56 per 1M tokens.
    best_for:
      - "Reasoning-tier turns that need a 1M window: very long transcripts, specs, logs, or pasted corpora with 1-5 tools"
      - "Academic or research-style questions over long sources plus optional figures, charts, or screenshots"
      - "Programming assistance over very long code or traces when complexity stays in the reasoning tier (not reasoning+)"
      - "Multimodal reasoning where 262K is too tight but Many2one depth still fits 1-5 tools (not Kimi-grade orchestration)"
    not_for: >
      Specialist repo coding without a real 1M or long-document need (prefer qwen/qwen3.5-35b-a3b for simple cases, or escalate to Kimi for reasoning+ depth). Light image or chart Q&A
      that fits in 262K (prefer qwen/qwen3.5-35b-a3b). Routine Agiweb CRUD and business queries without long-context pressure
      (prefer qwen/qwen3.5-397b-a17b). Heavy Many2one, 2-8 tool ERP chains, or demanding visual-agent coding (prefer Kimi).
      Deep conditional workflows with 5+ tools (complex tier).

  - id: "qwen/qwen3.5-397b-a17b"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.39"
      output_per_1m_tokens: "$2.34"
    description: >
      Qwen3.5 397B-A17B by Qwen. State-of-the-art across language understanding,
      logical reasoning, code generation, agent tasks, and GUI interactions.
      Default fallback model — reliable reasoning with strong tool robustness.
      262K context. $0.39/$2.34 per 1M tokens.
    best_for:
      - "Direct Agiweb queries with 1-5 linear tool calls: 'total sales this week', 'list overdue invoices'"
      - "Single Agiweb model CRUD with known fields: 'update phone for contact', 'mark task as done'"
      - "State queries: 'what is the balance', 'how many orders', 'list clients of X'"
      - "Questions about the current Agiweb page or conversation context"
      - "General reasoning and reliability when the task is ERP/business-first, not repo-centric coding"
    not_for: >
      Primary goal is software engineering over a codebase (use qwen/qwen3.5-plus-02-15 for long context, or escalate to Kimi for reasoning+ depth).
      Light vision+text or simple charts with 1-5 tools where the smaller VLM suffices (prefer qwen/qwen3.5-35b-a3b).
      Very long single-window context (>262K) or long multimodal bundles at reasoning tier (prefer qwen/qwen3.5-plus-02-15).
      Queries requiring comparison across multiple periods/entities,
      conditional workflows, deep Many2one resolution,
      or aggregation across 3+ different Agiweb models.

