# =============================================================================
# FACTOR AI — MODEL ROUTING CONFIGURATION
# =============================================================================
#
# PRINCIPLE: Good, Clean, and Cheap
#   The router does not match keywords. It reasons about SEMANTIC PATTERNS:
#   - How deep is the reasoning required?
#   - How many tools will the agent call?
#   - Is there a Many2one to resolve?
#   - Does the answer require synthesis across multiple domains?
#   - What is the cost of an error?
#
# ESCALATION LADDER (capability / typical use):
#   Qwen3.5 Plus        $1.56/M OR output — tier simple: chat trivial, 0-1 hops, 0-2 tool calls, 1M ctx
#   Qwen3.5 397B-A17B   $2.34/M OR output — tier reasoning: 1-5 linear tool calls, 262K ctx
#   Kimi K2.5           $2.20/M OR output — reasoning+, Many2one / multi-step, 2-8 tool calls
#   Gemini 3.1 Pro      $12.0/M Google output — complex/high-risk/high-context workflows, 1M ctx
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # TIER simple — Qwen3.5 Plus (2026-02-15) — perguntas simples (routeadas pelo classificador)
  # ---------------------------------------------------------------------------
  - id: "openrouter/qwen/qwen3.5-plus-02-15"
    tier: "simple"
    task_type: "simple"
    context_window: 1000000
    pricing:
      input_per_1m_tokens:  "$0.26"
      output_per_1m_tokens: "$1.56"
    description: >
      Qwen3.5 Plus (2026-02-15) by Qwen — native vision-language, hybrid linear attention + sparse MoE.
      Strong leap vs Qwen 3 in text and multimodal. Use for the SIMPLE tier only: minimal agentic load.
      1,000,000 context. $0.26/$1.56 per 1M tokens (OpenRouter).

      PATTERNS FOR THIS MODEL (simple tier):
        - Greetings, small talk, thank-you, confirmations without ERP depth
        - One-liner questions answerable without tools or with at most 1-2 trivial lookups
        - Rephrasing, summarizing a short user paste, formatting a tiny table
        - "What can you do?", capability questions, policy explanations in plain language
        - When in doubt between simple and reasoning, pick reasoning (397B) — reserve Plus for truly light load
    best_for:
      - "Ultra-light chat and UX copy: 'thanks', 'ok', 'explain this sentence'"
      - "Single fact or status when the agent needs at most 1-2 cheapest tool calls"
    not_for: >
      Multi-step ERP workflows, Many2one resolution, comparing periods or entities,
      anything that fits reasoning (397B) or reasoning+ (Kimi) — escalate.

  # ---------------------------------------------------------------------------
  # TIER reasoning — Qwen3.5 397B-A17B (DEFAULT quando classificador não escolhe simple)
  # ---------------------------------------------------------------------------
  - id: "openrouter/qwen/qwen3.5-397b-a17b"
    tier: "reasoning"
    task_type: "reasoning"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.39"
      output_per_1m_tokens: "$2.34"
    description: >
      Qwen3.5 397B-A17B by Qwen — strong reasoning, code, agents and multimodal grounding
      with 262K context. Use as the default reasoning tier for focused Agiweb work that is
      clearly beyond trivial chat but does not require the heavier Kimi or Gemini tiers.

      PATTERNS FOR THIS MODEL:
        - User asks a direct question answerable from the ERP with 1-5 linear tool calls
        - Query has clear structure: who, what, when, how much
        - No synthesis across multiple Agiweb domains — focused on one model at a time
        - State queries: "what is the balance", "how many orders", "list clients of X"
        - Simple CRUD: create or update one record with known fields
        - Linear reasoning — no ambiguity about what to do next
        - Questions about the current Agiweb page the user is viewing
        - Follow-ups that need reliable tool use or Agiweb grounding
    best_for:
      - "Direct Agiweb queries with 1-5 linear tool calls: 'total sales this week', 'list overdue invoices for client X'"
      - "Single Agiweb model CRUD with known fields: 'update phone for contact', 'mark task as done'"
      - "Questions about the current Agiweb page or conversation context"
      - "Simple conversation, follow-up, explanations, formatting of existing data"
    not_for: >
      Queries requiring comparison across multiple periods or entities,
      conditional workflows, deep Many2one resolution,
      aggregation across 3+ different Agiweb models.


  # ---------------------------------------------------------------------------
  # TIER 2 — Kimi K2.5 — reasoning+ (activo)
  # ---------------------------------------------------------------------------
  - id: "openrouter/moonshotai/kimi-k2.5"
    tier: "reasoning+"
    task_type: "reasoning+"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.45"
      output_per_1m_tokens: "$2.20"
    description: >
      Kimi K2.5 by MoonshotAI — state-of-the-art in visual coding and autonomous agent paradigm.
      Built on Kimi K2 with ~15T mixed visual and text tokens. Strong in general reasoning,
      visual coding and agentic tool-calling. 262K context. $0.45/$2.20 per 1M tokens.

      PATTERNS FOR THIS MODEL:
        - Query requires comparison or aggregation across 2-4 entities or time periods
        - Many2one to resolve: user mentions names that need ID lookup before create/update
        - Multiple Agiweb models involved but with known relationships
        - Query has ambiguity about which field or model to use — requires exploration
        - Light conditional reasoning: "if X then Y, else Z" with 1-2 levels
        - Financial analysis with 2-5 tool calls and some mathematical aggregation
        - Questions mentioning images, charts or visual Agiweb data
    best_for:
      - "User or product asks for reasoning+ / stronger reasoning tier → this model (Kimi K2.5), not Claude"
      - "Multi-step 2-8 tools with Many2one: 'create a sale for BOLTHERM with products from last quote'"
      - "Cross-model aggregation: 'total invoiced this month by client and product'"
      - "Ambiguity resolution: 'assign to the BOLTHERM account manager' (needs ID lookup)"
      - "Financial analysis: 'average margin per product in Q1', 'overdue receivables over 30 days'"
    not_for: >
      Workflows with 8+ tool calls and complex conditional logic,
      iterative self-correction, multi-agent orchestration,
      re-planning mid-execution.

  # ---------------------------------------------------------------------------
  # TIER complex/frontier — Gemini 3.1 Pro Preview (Google direto via LiteLLM)
  # ---------------------------------------------------------------------------
  - id: "gemini/gemini-3.1-pro-preview"
    tier: "frontier"
    task_type: "frontier"
    context_window: 1048576
    pricing:
      input_per_1m_tokens:  "$2.00"
      output_per_1m_tokens: "$12.00"
    description: >
      Gemini 3.1 Pro Preview by Google — frontier reasoning model for advanced development,
      high-context workflows, stronger agentic reliability and multimodal analysis. 1,048,576
      context. Native Google provider via LiteLLM. Use for the heaviest workflows only.

      PATTERNS FOR THIS MODEL:
        - Workflow requiring long-horizon planning, stronger self-correction or high reliability
        - 5+ tool calls with conditional logic, re-planning or structured execution risk
        - Large context windows where Kimi/Qwen may lose coherence
        - Complex coding, finance or spreadsheet-style workflows with high error cost
        - Explicit user request for maximum capability
    best_for:
      - "High-risk workflows where incorrect execution has real business cost"
      - "Long context tasks, complex coding, and structured planning"
      - "Frontier capability requests when Kimi is likely insufficient"
    not_for: >
      Trivial chat, light ERP lookups, or standard reasoning+ requests that Kimi can handle correctly.


# =============================================================================
# FALLBACK MODEL
# Used when the classifier cannot determine the tier with confidence.
# Qwen3.5 397B-A17B — default reasoning tier, 262K context, strong agents/code/VL.
# =============================================================================
default_model: "openrouter/qwen/qwen3.5-397b-a17b"


