  #     Gemma 4 26B MoE. 256K context, multimodal text + image. Large total parameter
  #     count with efficient active compute; workstation-class local execution with
  #     frontier-leaning scores for reasoning, coding, and agents at this cost tier.
  #   best_for:
  #     - "Long-context (up to 256K) vl-free reasoning with 0-4 tool calls"
  #     - "Heavy coding or multi-step agents where MoE efficiency matters"
  #   not_for: >
  #     When the dense 31B profile or a paid complex-tier model is the better semantic fit.

  # - id: "ollama/gemma4:31b"
  #   tier: "vl-free"
  #   task_type: "vl-free"
  #   tool_calls: "0-4"
  #   context_window: 262144
