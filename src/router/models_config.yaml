# =============================================================================
# FACTOR AI — MODEL ROUTING CONFIGURATION
# =============================================================================
#
# PRINCIPLE: Good, Clean, and Cheap
#   The router does not match keywords. It reasons about SEMANTIC PATTERNS:
#   - How deep is the reasoning required?
#   - How many tools will the agent call?
#   - Is there a Many2one to resolve?
#   - Does the answer require synthesis across multiple domains?
#   - What is the cost of an error?
#
# ESCALATION LADDER (capability vs listed output $/M in this file):
#   Qwen3.5 Plus        $1.56/M  — simple tier
#   Gemma 4 E2B         $0       — efficient reasoning-class edge
#   Qwen3.5 397B-A17B   $2.34/M  — reasoning
#   Gemma 4 E4B / 8B / 26B / 31B — strong local / MoE / dense (see entries)
#   Kimi K2.5           $2.20/M  — reasoning+
#   GPT-5.4 Mini        $4.50/M  — complex
#
# COST ACCOUNTING (gateway → llm_usage_log, no code change when you edit prices):
#   - pricing.input_per_1m_tokens / output_per_1m_tokens are USD per 1M tokens.
#   - $0 / $0 is valid: the cost center still records prompt_tokens, completion_tokens,
#     total_tokens, and snapshots input_price_per_1m / output_price_per_1m; total_cost_usd is 0.
#   - When you later set non-zero rates (local shadow pricing, proprietary API, etc.),
#     new turns use the updated YAML automatically via get_model_info → record_turn_usage.
# =============================================================================

