  - id: "qwen/qwen3.6-plus"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 1000000
    pricing:
      input_per_1m_tokens:  "$0.325"
      output_per_1m_tokens: "$1.95"
    description: >
      Qwen3.6 Plus by Qwen. Hybrid linear attention + sparse mixture-of-experts routing.
      Compared to the 3.5 series, it brings major gains in agentic coding, front-end
      development, and overall reasoning, with a significantly improved vibe-coding
      experience. Strong on complex tasks such as 3D scenes, games, and repository-level
      problem solving (SWE-bench Verified 78.8). 1,000,000 context. $0.325/$1.95 per
      1M tokens.
    best_for:
      - "Reasoning-tier tasks with stronger coding output and robust cost control"
      - "Agentic coding, front-end implementation, and repository-level problem solving"
      - "Operational Agiweb turns that need higher capability than chat-tier models"
    not_for: >
      Long-horizon workflows with high ambiguity, deep conditional orchestration,
      or broad cross-entity synthesis; escalate to 397B, Kimi, or complex tier as needed.

  - id: "qwen/qwen3.5-plus-02-15"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 1000000
    pricing:
      input_per_1m_tokens:  "$0.26"
      output_per_1m_tokens: "$1.56"
    description: >
      Qwen3.5 Plus with 1M token context. Hybrid architecture for efficient inference.
      Strong on coding, long documents, and multimodal tasks within 1-5 tool calls.
    best_for:
      - "Coding tasks: refactor, debug, implement, tests"
      - "Long context: >262K tokens, large documents, transcripts"
      - "Vision + text: image/chart analysis within 1M context"
      - "Multi-step linear ERP operations"
    not_for: >
      Simple greetings or single-entity lookups. Heavy multi-entity orchestration with 2-8 tools. Deep conditional workflows with 5+ tools.

  - id: "qwen/qwen3.5-397b-a17b"
    tier: "reasoning"
    task_type: "reasoning"
    tool_calls: "1-5"
    context_window: 262144
    pricing:
      input_per_1m_tokens:  "$0.39"
      output_per_1m_tokens: "$2.34"
    description: >
      Qwen3.5 397B-A17B. Reliable reasoning with strong tool robustness.
      Best for routine ERP queries and business operations. 262K context.
    best_for:
      - "Simple ERP queries: totals, lists, state queries"
      - "Single-entity CRUD operations"
      - "Greetings and conversational turns"
      - "Direct Agiweb queries with 1-5 linear tool calls"
    not_for: >
      Long context needs >262K. Multi-entity orchestration requiring 2-8 tools.
      Deep conditional workflows with 5+ tools.

